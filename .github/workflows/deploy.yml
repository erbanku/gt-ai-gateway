name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install
          cd frontend && npm install

      - name: Setup D1 Database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          # 检查数据库是否已存在
          echo "Checking for existing D1 database..."
          DB_INFO=$(npx wrangler d1 info gt_ai_gateway_db 2>&1) || true
          
          if [[ $DB_INFO == *"No database"* ]] || [[ $DB_INFO == *"not found"* ]]; then
            echo "Database not found. Creating new D1 database..."
            CREATE_OUTPUT=$(npx wrangler d1 create gt_ai_gateway_db)
            echo "$CREATE_OUTPUT"
            
            # 从输出中提取 database_id
            DB_ID=$(echo "$CREATE_OUTPUT" | grep "database_id = " | awk -F '"' '{print $2}')
            if [ -z "$DB_ID" ]; then
              echo "Error: Failed to extract database_id."
              exit 1
            fi
            echo "Extracted DB_ID: $DB_ID"
            
            # 使用 Node.js 脚本安全替换 wrangler.toml 中的 database_id
            node -e "
              const fs = require('fs');
              let content = fs.readFileSync('wrangler.toml', 'utf8');
              content = content.replace(/database_id\s*=\s*\".*?\"/, 'database_id = \"' + '$DB_ID' + '\"');
              fs.writeFileSync('wrangler.toml', content);
            "
          else
            echo "Database already exists."
            # 获取已存在的 DB ID 并写入 wrangler.toml
            DB_ID=$(npx wrangler d1 info gt_ai_gateway_db | grep -oE '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}')
            echo "Existing DB_ID: $DB_ID"
            node -e "
              const fs = require('fs');
              let content = fs.readFileSync('wrangler.toml', 'utf8');
              content = content.replace(/database_id\s*=\s*\".*?\"/, 'database_id = \"' + '$DB_ID' + '\"');
              fs.writeFileSync('wrangler.toml', content);
            "
          fi

      - name: Run D1 Migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "Applying migrations..."
          # Wrangler 有时候需要按 y 确认
          echo "y" | npx wrangler d1 migrations apply gt_ai_gateway_db --remote

      - name: Setup ROOT_TOKEN Secret
        id: setup_secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          # 检查是否已有 ROOT_TOKEN
          SECRETS=$(npx wrangler secret list)
          if [[ $SECRETS == *"ROOT_TOKEN"* ]]; then
            echo "ROOT_TOKEN already exists, skipping generation."
            echo "HAS_NEW_TOKEN=false" >> $GITHUB_OUTPUT
          else
            echo "Generating new ROOT_TOKEN..."
            NEW_TOKEN=$(node -e "console.log(require('crypto').randomUUID())")
            echo "$NEW_TOKEN" | npx wrangler secret put ROOT_TOKEN
            echo "HAS_NEW_TOKEN=true" >> $GITHUB_OUTPUT
            echo "NEW_TOKEN=$NEW_TOKEN" >> $GITHUB_OUTPUT
            
            echo "=========================================="
            echo "    🔥 NEW ROOT_TOKEN GENERATED 🔥"
            echo "=========================================="
            echo "Your new ROOT_TOKEN is: $NEW_TOKEN"
            echo "Please save this securely. You will need it to log in."
            echo "=========================================="
          fi

      - name: Build and Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npm run frontend:build
          npx wrangler deploy --minify

      - name: Deployment Summary
        run: |
          echo "✅ Deployment Successful!"
          echo "Check the 'Build and Deploy' step for your live URL."
          if [ "${{ steps.setup_secret.outputs.HAS_NEW_TOKEN }}" == "true" ]; then
            echo "⚠️ A new ROOT_TOKEN was generated for you in the 'Setup ROOT_TOKEN Secret' step."
          else
            echo "🔐 Using your existing ROOT_TOKEN."
          fi
