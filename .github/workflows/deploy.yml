name: Deploy Latest Release to Cloudflare

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-node:
    name: Test (Node Mode)
    runs-on: ubuntu-latest
    if: github.repository == 'alexazhou/gt_ai_gateway'

    steps:
      - name: Resolve latest release tag
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="$(gh api \
            --header "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/releases/latest" \
            --jq '.tag_name')"

          test -n "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout latest release
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix frontend ci

      - name: Build frontend
        run: npm run frontend:build

      - name: Run type check
        run: npm run backend:test:type

      - name: Run tests (Node mode)
        run: npm run backend:test:node

  test-worker:
    name: Test (Worker Mode)
    runs-on: ubuntu-latest
    if: github.repository == 'alexazhou/gt_ai_gateway'

    steps:
      - name: Resolve latest release tag
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="$(gh api \
            --header "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/releases/latest" \
            --jq '.tag_name')"

          test -n "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout latest release
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix frontend ci

      - name: Build frontend
        run: npm run frontend:build

      - name: Run tests (Worker mode)
        run: npm run backend:test:worker

  deploy:
    name: Deploy
    needs:
      - test-node
      - test-worker
    runs-on: ubuntu-latest
    if: >
      github.repository == 'alexazhou/gt_ai_gateway' &&
      needs.test-node.result == 'success' &&
      needs.test-worker.result == 'success'

    steps:
      - name: Resolve latest release tag
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="$(gh api \
            --header "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/releases/latest" \
            --jq '.tag_name')"

          test -n "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying latest release: $TAG"

      - name: Checkout latest release
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix frontend ci

      - name: Build frontend
        run: npm run frontend:build

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ROOT_TOKEN: ${{ secrets.ROOT_TOKEN }}
        run: |
          npm run deploy:cloudflare -- \
            --auto-create-db \
            --auto-create-r2 \
            --auto-migrate \
            --auto-create-root-token
