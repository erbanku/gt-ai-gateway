name: Deploy to Cloudflare

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  test-node:
    name: Test (Node Mode)
    runs-on: ubuntu-latest
    if: github.repository != 'alexazhou/gt_ai_gateway'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: |
          npm ci
          cd frontend && npm ci && cd ..

      - name: Build Frontend
        run: npm run frontend:build

      - name: Run type check
        run: npm run backend:test:type

      - name: Run tests (Node mode)
        run: npm run backend:test:node

  test-worker:
    name: Test (Worker Mode)
    runs-on: ubuntu-latest
    if: github.repository != 'alexazhou/gt_ai_gateway'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: |
          npm ci
          cd frontend && npm ci && cd ..

      - name: Build Frontend
        run: npm run frontend:build

      - name: Run tests (Worker mode)
        run: npm run backend:test:worker

  deploy:
    name: Deploy
    needs: [test-node, test-worker]
    runs-on: ubuntu-latest
    if: github.repository != 'alexazhou/gt_ai_gateway'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: |
          npm ci
          cd frontend && npm ci && cd ..

      - name: Build Frontend
        run: npm run frontend:build

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ROOT_TOKEN: ${{ secrets.ROOT_TOKEN }}
        run: |
          # The deploy script will verify environment variables, token permissions,
          # create the database and R2 bucket if needed, run migrations, and deploy the worker.
          npm run deploy:cloudflare -- --auto-create-db --auto-create-r2 --auto-migrate --auto-create-root-token
