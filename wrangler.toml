name = "gt-ai-gateway"
main = "src/index.ts"
compatibility_date = "2025-01-19"

compatibility_flags = [ "nodejs_compat", "no_handle_cross_request_promise_resolution" ]


[vars]
# ROOT_TOKEN = "your-root-token-here"

# [[kv_namespaces]]
# binding = "MY_KV_NAMESPACE"
# id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# [[r2_buckets]]
# binding = "MY_BUCKET"
# bucket_name = "my-bucket"

# Object storage for request/response payloads (see objectStorageService).
# Required in worker mode; in node mode payloads persist to the storage_record
# table and this binding is unused. Create the bucket in the Cloudflare dashboard
# and set bucket_name to match.
[[r2_buckets]]
binding = "OBJECT_BUCKET"
bucket_name = "gt-ai-gateway-objects"

[[d1_databases]]
binding = "DB"
database_name = "gt_ai_gateway"
database_id = "replace-with-your-d1-database-id"

# [ai]
# binding = "AI"

[observability]
enabled = true
head_sampling_rate = 1

[assets]
directory = "frontend/dist"
binding = "ASSETS"
